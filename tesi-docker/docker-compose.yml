version: '3.8'

services:
  couchdb:
    image: couchdb:latest
    container_name: tesi-couchdb
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=admin
    ports:
      - "5984:5984"
    volumes:
      - couchdb_data:/opt/couchdb/data
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: tesi-keycloak
    command: start-dev
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    ports:
      - "8080:8080"
    volumes:
      - ./tesi-theme:/opt/keycloak/themes/tesi-theme
      # Salvo il database interno di Keycloak per non perdere Realm e Utenti
      - keycloak_data:/opt/keycloak/data
    restart: unless-stopped

volumes:
  couchdb_data:
  # Dichiaro il volume persistente per Keycloak
  keycloak_data: